name: core-mall-infra

services:
  user-postgres:
    image: postgres:16-alpine
    container_name: coremall-user-postgres
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d user_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  order-postgres:
    image: postgres:16-alpine
    container_name: coremall-order-postgres
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d order_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - order_postgres_data:/var/lib/postgresql/data

  agent-postgres:
    image: postgres:16-alpine
    container_name: coremall-agent-postgres
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack:latest
    container_name: coremall-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: coremall-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  user_postgres_data:
  order_postgres_data:
  agent_postgres_data:
  redis_data:
  rabbitmq_data:
