server:
  port: 8083

spring:
  config:
    import: optional:classpath:application-sensitive.yml
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/agent_db}
    username: ${DB_USERNAME:agent}
    password: ${DB_PASSWORD:agent}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
  ai:
    mcp:
      client:
        enabled: true
        type: ASYNC
        stdio:
          connections:
            filesystem:
              command: npx
              args:
                - -y
                - "@modelcontextprotocol/server-filesystem"
                - ${user.dir}/data
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:}
        chat:
          options:
            model: gemini-3.1-flash-lite-preview
            temperature: 0.2
        embedding:
          api-key: ${GOOGLE_GENAI_API_KEY:}
          text:
            options:
              model: gemini-embedding-001
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-haiku-4-5-20251001
    chat:
      memory:
        repository:
          redis:
            index-name: coremall-chat-memory
            key-prefix: "chat-memory:"
  zipkin:
    base-url: ${ZIPKIN_URL:http://localhost:9411}
  reactor:
    context-propagation: auto

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  level:
    org.springframework.ai.mcp: DEBUG

order-service:
  base-url: http://localhost:8082

inventory-service:
  base-url: http://localhost:8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
